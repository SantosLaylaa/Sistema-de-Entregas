<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Entregas</title>
    <link rel="icon" type="image/png" href="imagem/baixados.png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <h2>📦 Sistema Entregas</h2>
            <p>Acesse o painel de controle</p>
        </div>

        <div class="login-tabs">
            <button class="tab-btn active" onclick="switchTab('aluno')">👨‍🎓 Aluno</button>
            <button class="tab-btn" onclick="switchTab('funcionario')">👷 Funcionário</button>
        </div>

        <form id="form-login-aluno" class="login-form active" onsubmit="fazerLogin('aluno', event)">
            <button type="button" class="btn btn-google" onclick="loginGoogle()">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google">
                Entrar com o Google
            </button>
            
            <div class="divider">ou</div>

            <div class="input-group">
                <label for="aluno-matricula">Matrícula</label>
                <input type="text" id="login-matricula-aluno" placeholder="Matrícula do Aluno" required/>
            </div>
            <div class="input-group">
                <label for="aluno-senha">Senha</label>
                <input type="password" id="login-senha-aluno" placeholder="Senha" required/>
            </div>
            <button type="submit" class="btn login-btn">Entrar como Aluno</button>
            
            <p class="toggle-link" onclick="toggleCadastro(true)">Não tem conta? Cadastre-se</p>
        </form>

        <form id="form-cadastro-aluno" class="login-form" onsubmit="fazerCadastro(event)">
            <h3>Novo Cadastro de Aluno</h3>
            
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" placeholder="Seu nome completo" required>
            </div>
            <div class="input-group">
                <label>CPF</label>
                <input type="text" id="cadastro-cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric" required>
            </div>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" placeholder="seu@email.com" required>
            </div>
            <div class="input-group">
                <label>Escola / Instituição de Ensino</label>
                <input type="text" placeholder="Nome da instituição" required>
            </div>
            <div class="input-group">
                <label>Endereço de Residência</label>
                <input type="text" placeholder="Rua, Número, Bairro, Cidade" required>
            </div>
            <div class="input-group">
                <label>Crie uma Senha</label>
                <input type="password" id="cadastro-senha" placeholder="••••••••" required>
            </div>

            <div class="divider">Documentação</div>

            <div class="input-group">
                <label>Documento de Identidade (Frente)</label>
                <input type="file" accept="image/*,.pdf" required>
            </div>
            <div class="input-group">
                <label>Documento de Identidade (Verso)</label>
                <input type="file" accept="image/*,.pdf" required>
            </div>
            <div class="input-group">
                <label>Comprovante de Matrícula</label>
                <input type="file" accept="image/*,.pdf" required>
            </div>

            <button type="submit" class="btn login-btn">Enviar para Análise</button>
            
            <p class="toggle-link" onclick="toggleCadastro(false)">Já tem conta? Faça Login</p>
        </form>

        <form id="form-login-funcionario" class="login-form" onsubmit="fazerLogin('funcionario', event)">
            <div class="input-group">
                <label for="func-matricula">Matrícula Funcional</label>
                <input type="text" id="login-matricula-func" placeholder="Matrícula do Funcionário" required/>
            </div>
            <div class="input-group">
                <label for="func-senha">Senha</label>
                <input type="password" id="login-senha-func" placeholder="Senha" required/>
            </div>
            <button type="submit" class="btn login-btn btn-func">Entrar como Funcionário</button>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
