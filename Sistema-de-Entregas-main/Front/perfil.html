<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Sistema Entregas</title>
    <link rel="icon" type="image/png" href="imagem/baixados.png">
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-primary);">
    
    <div class="card" style="width: 100%; max-width: 450px; text-align: center; padding: 40px 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <img id="perfil-foto-grande" src="" alt="Foto de Perfil" style="border-radius: 50%; border: 4px solid var(--accent-color); margin-bottom: 20px; width: 120px; height: 120px; object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        
        <h2 id="perfil-nome" style="margin-bottom: 5px; color: var(--bg-sidebar);">Nome do Usuário</h2>
        <p id="perfil-tipo" style="color: var(--accent-color); font-weight: 600; margin-bottom: 5px; text-transform: uppercase; font-size: 14px;">TIPO</p>
        <p id="perfil-id" style="color: #64748b; margin-bottom: 30px; font-size: 14px;">ID: ---</p>
        
        <div style="display: flex; gap: 15px; justify-content: center; flex-direction: column;">
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">Voltar ao Dashboard</button>
            <button class="btn" style="background-color: #ef4444;" onclick="fazerLogout()">Sair da Conta</button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="perfil.js"></script>
</body>
</html>
